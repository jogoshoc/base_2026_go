{{template "base" .}}
{{define "change-password-content"}}
<div class="login-wrapper">
    <div class="login-box">
        <h1>Trocar Senha</h1>
        <form method="post">
            <div class="form-group">
                <label for="old_password">Senha atual</label>
                <input type="password" id="old_password" name="old_password" placeholder="Digite sua senha atual" required autofocus>
            </div>
            <div class="form-group">
                <label for="new_password">Nova senha</label>
                <input type="password" id="new_password" name="new_password" placeholder="Digite a nova senha (mín. 3 caracteres)" minlength="3" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirmar nova senha</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repita a nova senha" required>
            </div>
            <button type="submit" class="btn btn-primary" name="btnSubmit" value="Alterar">Alterar</button>
        </form>
        <div style="text-align:center; margin-top:15px;">
            <a href="/menu" class="btn-link">Voltar ao menu</a>
        </div>
        {{if .ErrorMsg}}
        <div class="error-msg" style="margin-top:15px; text-align:center;">{{.ErrorMsg}}</div>
        {{end}}
        {{if .SuccessMsg}}
        <div class="success-msg" style="margin-top:15px; text-align:center;">{{.SuccessMsg}}</div>
        {{end}}
    </div>
</div>
{{end}}
